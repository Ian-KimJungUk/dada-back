# Fly.io 배포 설정
# 최초 1회: `fly launch --no-deploy` 로 앱 생성(또는 아래 app 이름을 직접 사용)
# 시크릿 주입: `fly secrets set DATABASE_URL=... REDIS_URL=...`
# 배포: `fly deploy`

app = "dada-back"
primary_region = "nrt" # Tokyo (한국에서 가장 가까운 Fly 리전)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"

# 새 버전 배포 직전에 마이그레이션을 실행한다.
[deploy]
  release_command = "npx prisma migrate deploy"

[http_service]
  internal_port = 3000
  force_https = true
  # WebSocket 지속 연결을 위해 머신을 항상 켜둔다.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

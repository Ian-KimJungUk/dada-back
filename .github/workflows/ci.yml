name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Lint · Build · Test
    runs-on: ubuntu-latest

    # e2e에서 사용할 DB/Redis를 CI 안에서 컨테이너로 띄운다.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dada_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d dada_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/dada_test?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci의 postinstall이 prisma generate까지 수행한다.
      - name: Install dependencies
        run: npm ci

      - name: Lint (check only)
        run: npx eslint "{src,test}/**/*.ts"

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t dada-back:ci .

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Lint · Build · Test
    runs-on: ubuntu-latest

    # e2e에서 사용할 DB/Redis를 CI 안에서 컨테이너로 띄운다.
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: dada_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d dada_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/dada_test?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci의 postinstall이 prisma generate까지 수행한다.
      - name: Install dependencies
        run: npm ci

      - name: Lint (check only)
        run: npx eslint "{src,test}/**/*.ts"

      - name: Build
        run: npm run build

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t dada-back:ci .

  deploy:
    name: Deploy to Fly.io
    # 테스트와 이미지 빌드가 모두 통과해야 하고, main에 push(=PR merge)될 때만 배포한다.
    needs: [test, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: deploy-fly # 동시 배포 방지
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Fly가 원격 빌더에서 이미지를 빌드하고, release_command로 마이그레이션 후 배포한다.
      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
